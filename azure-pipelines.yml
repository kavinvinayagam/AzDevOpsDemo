trigger:
- master

pool:
  name: Default

steps:

# 🔍 SHOW EVERYTHING
- script: dir /s
  displayName: DEBUG FILE STRUCTURE

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore **/*.csproj
  displayName: Restore

- script: dotnet build **/*.csproj --configuration Release
  displayName: Build