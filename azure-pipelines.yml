trigger:
- master

stages:

# ─── CI Stage (Build) ───────────────────────────────
- stage: Build
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'windows-latest'    # Microsoft hosted for build
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - script: dotnet restore AzDevOpsDemoGenerator/src/ADOGenerator/ADOGenerator.csproj
      displayName: Restore

    - script: dotnet build AzDevOpsDemoGenerator/src/ADOGenerator/ADOGenerator.csproj --configuration Release --no-restore
      displayName: Build

    - script: dotnet publish AzDevOpsDemoGenerator/src/ADOGenerator/ADOGenerator.csproj --configuration Release --output $(Build.ArtifactStagingDirectory)
      displayName: Publish

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
      displayName: Upload Artifact

# ─── CD Stage (Deploy to Local Folder) ──────────────
- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployJob
    pool:
      name: Default  
    steps:
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(System.ArtifactsDirectory)\drop'
        Contents: '**'
        TargetFolder: 'C:\Users\yamuv\OneDrive\Desktop\Test'
        CleanTargetFolder: true     # Clears old files before each deploy
      displayName: Deploy to Local Folder
