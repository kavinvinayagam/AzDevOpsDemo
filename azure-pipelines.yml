trigger:
- master

pool:
  vmImage: 'windows-latest'   # ✅ Switch to Microsoft-hosted agent

steps:
- script: dir /s
  displayName: Show all files (debug)

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore AzDevOpsDemoGenerator/src/ADOGenerator/ADOGenerator.csproj
  displayName: Restore

- script: dotnet build AzDevOpsDemoGenerator/src/ADOGenerator/ADOGenerator.csproj --configuration Release --no-restore
  displayName: Build