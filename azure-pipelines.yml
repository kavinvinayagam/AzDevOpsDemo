trigger:
- master

pool:
  name: Default   # your local agent

steps:

- script: echo "Pipeline connected successfully"
  displayName: Test Connection

- script: dir
  displayName: Show Files

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore AzDevOpsDemoGenerator/src/ADOGenerator/ADOGenerator.csproj
  displayName: Restore

- script: dotnet build AzDevOpsDemoGenerator/src/ADOGenerator/ADOGenerator.csproj --configuration Release
  displayName: Build

- script: dotnet publish AzDevOpsDemoGenerator/src/ADOGenerator/ADOGenerator.csproj -c Release -o $(Build.ArtifactStagingDirectory)
  displayName: Publish

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: drop